<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wild Hog Canoe Race Scorecard</title>
  <link rel="stylesheet" href="scorecard.css?v=20260415-2" />
</head>
<body class="public-scorecard-page">
  <header class="board-header public-scorecard-header">
    <div>
      <p class="eyebrow">Wild Hog Canoe Race</p>
      <h1>Official Scorecard</h1>
      <p class="subtitle">Live public standings from the shared race state.</p>
    </div>
    <div class="header-actions">
      <button type="button" id="scorecard-refresh-button" class="header-button">Refresh</button>
      <div id="scorecard-connection-pill" class="pill" data-status="loading">Connecting</div>
      <div id="scorecard-updated-pill" class="pill pill-muted">Waiting for data</div>
    </div>
  </header>

  <main class="public-scorecard-shell">
    <section class="summary-grid public-summary-grid">
      <article class="summary-card">
        <span class="summary-label">Teams</span>
        <strong id="scorecard-summary-total">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">Finished</span>
        <strong id="scorecard-summary-finished">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">Still Racing</span>
        <strong id="scorecard-summary-racing">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">DNF</span>
        <strong id="scorecard-summary-dnf">0</strong>
      </article>
    </section>

    <section class="card public-scorecard-card">
      <div class="scorecard-toolbar">
        <p id="public-score-summary">Loading scorecard...</p>
      </div>
      <div id="public-score-fit-frame" class="score-fit-frame public-score-fit-frame">
        <div id="public-score-groups" class="score-groups"></div>
      </div>
    </section>
  </main>

  <script type="module" src="js/public-scorecard.js?v=20260415-2"></script>
</body>
</html>
